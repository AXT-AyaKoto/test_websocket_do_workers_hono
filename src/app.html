<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Unique Counter Demo</title>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: sans-serif;
                background: #f5f6fa;
                color: #222;
            }
            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            h1 {
                margin-bottom: 30px;
                font-size: 2.1rem;
                letter-spacing: 0.02em;
                color: #282c34;
                text-shadow: 0 3px 6px #ececec;
            }
            .container {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
                padding: 32px 42px 28px 42px;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-width: 240px;
            }
            #counter {
                font-size: 3.6rem;
                margin: 0 0 24px 0;
                font-weight: 700;
                letter-spacing: 0.05em;
                color: #4257b2;
                text-align: center;
            }
            #increment {
                font-size: 2rem;
                padding: 0.5em 1.3em;
                border: none;
                border-radius: 8px;
                background: #4257b2;
                color: #fff;
                transition:
                    background 0.2s,
                    transform 0.1s;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(66, 87, 178, 0.08);
            }
            #increment:hover,
            #increment:focus {
                background: #2e3f85;
                transform: translateY(-2px) scale(1.05);
                outline: none;
            }
        </style>
        <script type="module">
            // ページのロード完了を待つ
            await new Promise((resolve) => {
                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", () => resolve());
                } else {
                    resolve();
                }
            });
            // WebSocket接続を確立
            const ws = new WebSocket(`${location.origin.replace(/^http/, "ws")}/ws`);
            // open ... statusほしいよ〜のメッセージを送る
            ws.addEventListener("open", (event) => {
                ws.send(JSON.stringify({ command: "status" }));
            });
            // message ... commnad: countならcurrentをcounterに反映
            ws.addEventListener("message", (event) => {
                const data = JSON.parse(event.data);
                if (data.command === "count") {
                    document.getElementById("counter").textContent = data.current.toString();
                }
            });
            // error ... エラーをログ出力
            ws.addEventListener("error", (event) => {
                console.log(event);
            });
            // close ... 接続切れをログ出力
            ws.addEventListener("close", (event) => {
                console.log(event);
            });
            // ボタンを押したらincrementメッセージを送る
            document.getElementById("increment").addEventListener("click", (event) => {
                ws.send(JSON.stringify({ command: "increment" }));
            });
        </script>
    </head>
    <body>
        <h1>Unique Counter Demo</h1>
        <div class="container">
            <p id="counter">0</p>
            <button id="increment">+</button>
        </div>
    </body>
</html>
